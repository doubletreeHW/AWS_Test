name: Deploy to Amazon ECS

on:
  push:
    branches: [ "main" ] # 배포를 트리거할 브랜치 지정

env:
  AWS_REGION: ap-northeast-2                   # AWS 리전 설정 (예: ap-northeast-2)
  ECR_REPOSITORY: aws-test-repo                # Amazon ECR 리포지토리 이름
  ECS_SERVICE: aws-test-service                # ECS 서비스 이름
  ECS_CLUSTER: aws-test-cluster                # ECS 클러스터 이름
  ECS_TASK_DEFINITION: .aws/task-definition.json # ECS Task Definition 파일 경로
  CONTAINER_NAME: aws-test-container           # Task Definition 내 정의한 컨테이너 이름

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    environment: production

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    # 1. Java 17 설정 및 Gradle 빌드
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build with Gradle
      run: ./gradlew build -x test # 테스트를 포함하려면 -x test를 제거하세요.

    # 2. AWS 인증 (Secrets 사용 방식)
    # AWS IAM User의 Access Key를 GitHub Secrets에 등록하여 인증합니다.
    # (더 안전한 인증을 위해 OIDC Role 사용을 권장합니다)
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    # 3. Amazon ECR 로그인
    - name: Log in to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    # 4. Docker 이미지 빌드 및 ECR 푸시
    - name: Build, tag, and push image to Amazon ECR
      id: build-image
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        IMAGE_TAG: ${{ github.sha }}
      run: |
        docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
        echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

    # 5. ECS Task Definition의 이미지 정보 업데이트
    - name: Fill in the new image ID in the Amazon ECS task definition
      id: render-task-def
      uses: aws-actions/amazon-ecs-render-task-definition@v1
      with:
        task-definition: ${{ env.ECS_TASK_DEFINITION }}
        container-name: ${{ env.CONTAINER_NAME }}
        image: ${{ steps.build-image.outputs.image }}

    # 6. ECS 서비스 배포
    - name: Deploy Amazon ECS task definition
      uses: aws-actions/amazon-ecs-deploy-task-definition@v2
      with:
        task-definition: ${{ steps.render-task-def.outputs.task-definition }}
        service: ${{ env.ECS_SERVICE }}
        cluster: ${{ env.ECS_CLUSTER }}
        wait-for-service-stability: true
